<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    

</head>
<body>
    <!-- Contenedor del Mapa -->
    <div id="map" style="height: 500px;"></div>

    <!-- Script -->
    <script>
        var mapaNormal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        var mapaOscuro = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
        var map = L.map('map', {
            center: [-34.6037, -58.3816],
            zoom: 5,
            layers: [mapaNormal]
        });

        var capas = {
            "Mapa Normal": mapaNormal,
            "Dark Oscuro": mapaOscuro
        };

        L.control.layers(capas).addTo(map);

    </script>
</body>
</html>
