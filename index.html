<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Estas dos lineas sirven para usar la libreria Leaflet en el proyecto -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    

</head>
<body>
    <!-- Contenedor del Mapa -->
    <div id="map" style="height: 500px;"></div>
    <!-- crear el mapa -->
    <script>
        // Esta línea crea un mapa usando Leaflet y lo posiciona.
        //  PARTE POR PARTE
        // var map, 
        // Explicación: “Guardamos el mapa en una variable para poder usarlo después”

        // 2. L.map('map')
        // Crea el mapa
        // L.map('map')
        //  ¿Qué es L? : Es el objeto principal de Leaflet
        //  ¿Qué significa 'map'? es el id del htmp, donde va el mapa
        //  Explicación: “Le decimos a Leaflet dónde dibujar el mapa”

        // 3. .setView(...)  Define la vista inicial del mapa
    var map = L.map('map').setView([-37.29908209830175, -59.118281690131546], 16);
    // Agregar mapa real
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'}).addTo(map);
    
//  Importamos Leaflet con <link> (estilos) y <script> (funcionalidad).
//  L.map('map') crea el mapa dentro de un <div> con id map.
//  .setView([lat, lon], zoom) define la ubicación inicial y el nivel de zoom.
//  L.tileLayer(...) carga las imágenes del mapa desde OpenStreetMap usando coordenadas dinámicas.
//  .addTo(map) agrega esa capa al mapa para que finalmente se vea en pantalla.

// agregamos un Marcador al  Mapa
    var marker1 = L.marker([-37.297676932026796, -59.11818793025973]).addTo(map);
    marker1.bindPopup("Hola! Estamos en Villa Aguirre 😄");

    var marker2 = L.marker([-37.303799943066565, -59.11960611804421]).addTo(map);
    marker2.bindPopup("Hola! Estamos en El Hipodromo 😄");

    var marker3 = L.marker([-37.3035212566859, -59.12439520395873]).addTo(map);
    marker3.bindPopup("Hola! RURA 226 😄");

    // “Cuando el usuario hace click, capturamos la posición y la mostramos.”

    map.on('click', function(e) {
    alert("Lat: " + e.latlng.lat + " - Lng: " + e.latlng.lng);
    });


    // Dibujamos un Circulo
    L.circle([-37.297676932026796, -59.11818793025973], {
    radius: 200,
    color: 'blue'
    }).addTo(map);

    L.polygon([
     [-37.2976, -59.1181],
    [-37.2977, -59.1183],
    [-37.2978, -59.1181],
    [-37.2977, -59.1180]
]).addTo(map);


let puntos = [];
let poligono;

map.on('click', function(e) {
    puntos.push([e.latlng.lat, e.latlng.lng]);

    // Si ya hay un polígono, lo borro
    if (poligono) {
        map.removeLayer(poligono);
    }

    // Creo el nuevo polígono con los puntos
    poligono = L.polygon(puntos, {
        color: 'red'
    }).addTo(map);
});


    </script>


  
</body>
</html>
